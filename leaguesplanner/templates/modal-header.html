<div class="flex justify-center">
  <!-- Modal -->
  <div x-show="$store.{{ modal_name }}.show"
    style="display: none"
    x-on:keydown.escape.prevent.stop="$store.{{ modal_name }}.toggle()"
    role="dialog"
    aria-modal="true"
    x-id="['modal-title']"
    :aria-labelledby="$id('modal-title')"
    class="fixed inset-0 z-10 overflow-y-auto">
      <!-- Overlay -->
    <div x-show="$store.{{ modal_name }}.show" x-transition.opacity class="fixed inset-0 bg-black/25"></div>

      <!-- Panel -->
    <div x-show="$store.{{ modal_name }}.show" x-transition
      x-on:click="$store.{{ modal_name }}.toggle()"
      class="relative flex min-h-screen items-center justify-center p-4">
      <div x-on:click.stop
        x-trap.noscroll.inert="$store.{{ modal_name }}.show"
        class="relative min-w-96 max-w-xl rounded-xl bg-white p-6 shadow-lg">
