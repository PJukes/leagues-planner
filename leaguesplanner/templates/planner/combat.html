<template id="combat-template">
  <form>
    <h5 class="text-gray-700 font-medium text-lg mb-4">Select a Creature to Fight</h5>
    <p class="text-gray-600 mb-2">Choose a combat.</p>
    <div class="flex justify-between gap-2">
      <div class="flex-1">
        <div><label for="combatStyle" class="text-sm text-gray-600">Combat Style</label></div>
        <select name="combatStyle" id="combatStyle" x-model="combatStyle" class="w-full px-2 py-1 text-sm border border-gray-300 rounded">
          <option value="">Select combat style</option>
          <option value="attack">Attack</option>
          <option value="strength">Strength</option>
          <option value="defence">Defence</option>
          <option value="ranged">Ranged</option>
          <option value="magic">Magic</option>
        </select>
      </div>

      <div class="flex-1">
        <div><label for="skillMethod" class="text-sm text-gray-600">Fighting Against</label></div>
        <select name="combatCreature" id="combatCreature" x-model="combatCreature" class="w-full px-2 py-1 text-sm border border-gray-300 rounded">
          <option value="">Select creature</option>
          <template x-for="(m, i) in getCreatureOptions() || []" :key="i">
            <option :value="m.key" x-text="`${m.name} (${m.hitpoints * 4} xp)`"></option>
          </template>
          <template x-if="!getCreatureOptions() || getCreatureOptions().length === 0">
            <option disabled>No creatures available</option>
          </template>
        </select>
      </div>

      <div class="flex-1">
        <div><label for="id_quantity" class="text-sm text-gray-600">Quantity</label></div>
        <input type="number" name="quantity" id="id_quantity" x-model.number="combatQuantity" placeholder="Quantity" min="1" class="w-full px-2 py-1 text-sm border border-gray-300 rounded">
      </div>
    </div>

    
    <div class="mt-4 flex justify-between">
      <p class="mt-2 text-sm text-gray-600">
        <span x-text="`Total xp: ${(getCreature()?.hitpoints || 0) * 4 * (combatQuantity || 0) * (currentExpModifier() || 5)}`"></span>
      </p>

      <button type="button"
        @click="addCombatAction(combatStyle, combatCreature, combatQuantity)"
        class="relative flex items-center justify-center gap-2 whitespace-nowrap rounded-lg border border-transparent bg-gray-800 px-4 py-2 text-white hover:bg-gray-900 disabled:cursor-not-allowed disabled:bg-gray-400">
        Confirm
      </button>
    </div>
  </form>
</template>
