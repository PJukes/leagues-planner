<template x-if="action.type==='combat'">
  <li @click="selectTask(action.key)" :class="action.selected ? 'border-indigo-600' : 'border-orange-300'" class="relative rounded-lg border bg-orange-100 px-4 py-2 shadow-sm focus-within:outline focus-within:outline-2 focus-within:outline-offset-2 focus-within:outline-indigo-600 hover:border-gray-400 cursor-hover">
    <div class="flex items-center space-x-3">
      <span class="drag-handle cursor-grab select-none text-gray-300 hover:text-gray-400" @click.stop title="Drag to reorder">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="display:block" class="text-black text-opacity-20">
          <circle cx="5" cy="4" r="1.4"/><circle cx="11" cy="4" r="1.4"/>
          <circle cx="5" cy="8" r="1.4"/><circle cx="11" cy="8" r="1.4"/>
          <circle cx="5" cy="12" r="1.4"/><circle cx="11" cy="12" r="1.4"/>
        </svg>
      </span>
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-5 text-orange-600">
        <path fill-rule="evenodd" d="M12.963 2.286a.75.75 0 0 0-1.071-.136 9.742 9.742 0 0 0-3.539 6.176 7.547 7.547 0 0 1-1.705-1.715.75.75 0 0 0-1.152-.082A9 9 0 1 0 15.68 4.534a7.46 7.46 0 0 1-2.717-2.248ZM15.75 14.25a3.75 3.75 0 1 1-7.313-1.172c.628.465 1.35.81 2.133 1a5.99 5.99 0 0 1 1.925-3.546 3.75 3.75 0 0 1 3.255 3.718Z" clip-rule="evenodd" />
      </svg>

      <div class="min-w-0 flex-1">
        <p x-text="action.skillLabel" class="text-sm font-medium text-orange-900"></p>
        <div class="flex justify-between">
          <p x-text="action.creatureName" class="text-sm text-orange-900"></p>
          <p x-text="`x ${action.quantity}`" class="text-sm text-orange-900"></p>
          <p x-text="`+${action.experience || 0} xp`" class="text-sm text-orange-900"></p>
        </div>
      </div>

      <button @click.stop="removeTask(action.key)" class="remove-task-btn">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-4 text-gray-400 hover:text-gray-500">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <div x-show="action.selected" class="flex gap-x-4 mt-2">
      <div>
        <p class="text-xs font-medium text-gray-500">Total Points</p>
        <p x-text="action.cumulativePoints"></p>
      </div>
      <div>
        <p class="text-xs font-medium text-gray-500">Total GP</p>
        <p x-text="action.totalGold"></p>
      </div>
      <div>
        <p class="text-xs font-medium text-gray-500">HP Bonus</p>
        <p x-text="`+${action.hitpointsExperience || 0} xp`" class="text-xs text-orange-700"></p>
      </div>
      <div>
        <button @click="showStats(action.key)" type="button" class="text-xs font-medium text-gray-700/60">Show Stats</button>
      </div>
    </div>
  </li>
</template>
