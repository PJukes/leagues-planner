<!-- DESTINATION type -->
<template x-if="action.type==='destination'">
  <li @click="editingAction !== action.key && selectTask(action.key)" :class="action.selected ? 'border-indigo-600' : 'border-gray-300'" class="relative rounded-lg border bg-pink-100 px-4 py-2 shadow-sm focus-within:outline focus-within:outline-2 focus-within:outline-offset-2 focus-within:outline-indigo-600 hover:border-gray-400 cursor-hover">

    <!-- Normal view -->
    <div x-show="editingAction !== action.key">
      <div class="flex items-center space-x-3">
        <span class="drag-handle cursor-grab select-none text-gray-300 hover:text-gray-400" @click.stop title="Drag to reorder">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="display:block" class="text-black text-opacity-20">
            <circle cx="5" cy="4" r="1.4"/><circle cx="11" cy="4" r="1.4"/>
            <circle cx="5" cy="8" r="1.4"/><circle cx="11" cy="8" r="1.4"/>
            <circle cx="5" cy="12" r="1.4"/><circle cx="11" cy="12" r="1.4"/>
          </svg>
        </span>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-5 text-pink-600">
          <path fill-rule="evenodd" d="M3.74 3.749a.75.75 0 0 1 .75.75V15h13.938l-2.47-2.47a.75.75 0 0 1 1.061-1.06l3.75 3.75a.75.75 0 0 1 0 1.06l-3.75 3.75a.75.75 0 0 1-1.06-1.06l2.47-2.47H3.738a.75.75 0 0 1-.75-.75V4.5a.75.75 0 0 1 .75-.751Z" clip-rule="evenodd" />
        </svg>

        <div class="min-w-0 flex-1">
          <p x-text="action.description" class="text-sm font-medium text-pink-900"></p>
        </div>

        <!-- Edit button -->
        <button @click.stop="startEdit(action.key)" title="Edit" class="text-gray-400 hover:text-pink-600 mr-1">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10" />
          </svg>
        </button>

        <button @click.stop="removeTask(action.key)" class="remove-task-btn">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-4 text-gray-400 hover:text-gray-500">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <div x-show="action.selected" class="flex gap-x-4 mt-2">
        <div>
          <p class="text-xs font-medium text-gray-700/40">Total Points</p>
          <p x-text="action.cumulativePoints"></p>
        </div>
        <div>
          <p class="text-xs font-medium text-gray-700/60">Total XP</p>
          <p></p>
        </div>
        <div>
          <button @click="showStats(action.key)" type="button" class="text-xs font-medium text-gray-700/60">Show Stats</button>
          <p></p>
        </div>
      </div>
    </div>

    <!-- Edit form for destination actions -->
    <div x-show="editingAction === action.key" @click.stop>
      <p class="text-xs font-semibold text-pink-800 mb-2">Edit Destination</p>
      <div class="flex flex-col gap-2">
        <input type="text" x-model="editFormData.description" class="text-sm border rounded px-2 py-1 bg-white" placeholder="Description">
        <div class="flex gap-2 justify-end">
          <button @click="cancelEdit()" class="text-xs px-3 py-1 rounded border border-gray-300 hover:bg-gray-50">Cancel</button>
          <button @click="saveEdit()" class="text-xs px-3 py-1 rounded bg-pink-600 text-white hover:bg-pink-700">Save</button>
        </div>
      </div>
    </div>
  </li>
</template>
