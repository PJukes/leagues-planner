<!-- PURCHASE type -->
<template x-if="action.type==='purchase'">
  <li @click="selectTask(action.key)" :class="action.selected ? 'border-indigo-600' : 'border-teal-300'" class="relative rounded-lg border bg-teal-50 px-4 py-2 shadow-sm hover:border-teal-400 cursor-pointer">
    <div class="flex items-center space-x-3">
      <span class="drag-handle cursor-grab select-none text-gray-300 hover:text-gray-400" @click.stop title="Drag to reorder">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="display:block" class="text-black text-opacity-20">
          <circle cx="5" cy="4" r="1.4"/><circle cx="11" cy="4" r="1.4"/>
          <circle cx="5" cy="8" r="1.4"/><circle cx="11" cy="8" r="1.4"/>
          <circle cx="5" cy="12" r="1.4"/><circle cx="11" cy="12" r="1.4"/>
        </svg>
      </span>
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-5 text-teal-600 flex-shrink-0">
        <path d="M2.25 2.25a.75.75 0 0 0 0 1.5h1.386c.17 0 .318.114.362.278l2.558 9.592a3.752 3.752 0 0 0-2.806 3.63c0 .414.336.75.75.75h15.75a.75.75 0 0 0 0-1.5H5.378A2.25 2.25 0 0 1 7.5 15h11.218a.75.75 0 0 0 .674-.421 60.358 60.358 0 0 0 2.96-7.228.75.75 0 0 0-.525-.965A60.864 60.864 0 0 0 5.68 4.509l-.232-.867A1.875 1.875 0 0 0 3.636 2.25H2.25ZM3.75 20.25a1.5 1.5 0 1 1 3 0 1.5 1.5 0 0 1-3 0ZM16.5 20.25a1.5 1.5 0 1 1 3 0 1.5 1.5 0 0 1-3 0Z" />
      </svg>

      <div class="min-w-0 flex-1">
        <div class="flex items-center justify-between gap-2">
          <p x-text="action.shopName" class="text-sm font-medium text-teal-900"></p>
          <span class="text-sm font-medium text-red-600 flex-shrink-0"
                x-text="'-' + (action.totalCost || 0).toLocaleString() + ' gp'"></span>
        </div>
        <div class="flex flex-wrap gap-1 mt-1">
          <template x-for="item in (action.items || [])" :key="item.item">
            <span class="bg-teal-100 text-teal-700 text-xs px-1.5 py-0.5 rounded font-medium"
                  x-text="'+' + item.quantity.toLocaleString() + ' ' + item.name"></span>
          </template>
        </div>
      </div>

      <!-- GP warning -->
      <template x-if="action.gpWarning">
        <span class="text-amber-500 flex-shrink-0 mr-1"
              :title="'Cannot afford: have ' + (action.gpWarning.available).toLocaleString() + ' gp, need ' + (action.gpWarning.needed).toLocaleString() + ' gp'">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-4">
            <path fill-rule="evenodd" d="M9.401 3.003c1.155-2 4.043-2 5.197 0l7.355 12.748c1.154 2-.29 4.5-2.599 4.5H4.645c-2.309 0-3.752-2.5-2.598-4.5L9.4 3.003ZM12 8.25a.75.75 0 0 1 .75.75v3.75a.75.75 0 0 1-1.5 0V9a.75.75 0 0 1 .75-.75Zm0 8.25a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Z" clip-rule="evenodd" />
          </svg>
        </span>
      </template>

      <button @click.stop="removeTask(action.key)">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-4 text-gray-400 hover:text-gray-500">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Selected detail -->
    <div x-show="action.selected" class="flex flex-wrap gap-x-4 mt-2">
      <div>
        <p class="text-xs font-medium text-gray-500">Total Points</p>
        <p x-text="action.cumulativePoints"></p>
      </div>
      <div>
        <p class="text-xs font-medium text-gray-500">Cost</p>
        <p x-text="(action.totalCost || 0).toLocaleString() + ' gp'"></p>
      </div>
      <div>
        <p class="text-xs font-medium text-gray-500">GP After</p>
        <p :class="(action.cumulativeGold || 0) < 0 ? 'text-red-600 font-medium' : ''"
            x-text="(action.cumulativeGold || 0).toLocaleString() + ' gp'"></p>
      </div>
      <template x-if="action.gpWarning">
        <div>
          <p class="text-xs font-medium text-amber-600">GP Warning</p>
          <p class="text-xs text-amber-700"
              x-text="'Have ' + action.gpWarning.available.toLocaleString() + ' gp, need ' + action.gpWarning.needed.toLocaleString() + ' gp'"></p>
        </div>
      </template>
    </div>
  </li>
</template>
