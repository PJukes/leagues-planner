  <!-- QUEST type -->
  <template x-if="action.type==='quest'">
    <li @click="selectTask(action.key)" :class="action.selected ? 'border-indigo-600' : 'border-orange-300'" class="relative rounded-lg border bg-orange-50 px-4 py-2 shadow-sm hover:border-orange-400 cursor-pointer">
      <div class="flex items-center space-x-3">
        <span class="drag-handle cursor-grab select-none text-gray-300 hover:text-gray-400" @click.stop title="Drag to reorder">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="display:block" class="text-black text-opacity-20">
            <circle cx="5" cy="4" r="1.4"/><circle cx="11" cy="4" r="1.4"/>
            <circle cx="5" cy="8" r="1.4"/><circle cx="11" cy="8" r="1.4"/>
            <circle cx="5" cy="12" r="1.4"/><circle cx="11" cy="12" r="1.4"/>
          </svg>
        </span>
        <!-- Scroll/quest icon -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-4 text-orange-600 flex-shrink-0">
          <path fill-rule="evenodd" d="M10.788 3.21c.448-1.077 1.976-1.077 2.424 0l2.082 5.006 5.404.434c1.164.093 1.636 1.545.749 2.305l-4.117 3.527 1.257 5.273c.271 1.136-.964 2.033-1.96 1.425L12 18.354 7.373 21.18c-.996.608-2.231-.29-1.96-1.425l1.257-5.273-4.117-3.527c-.887-.76-.415-2.212.749-2.305l5.404-.434 2.082-5.005Z" clip-rule="evenodd" />
        </svg>

        <div class="min-w-0 flex-1">
          <p x-text="action.name" class="text-sm font-medium text-orange-900"></p>
          <div class="flex flex-wrap gap-1 mt-1">
            <!-- XP reward badges -->
            <template x-for="r in (action.xpRewards || [])" :key="r.skill">
              <span class="bg-orange-100 text-orange-700 text-xs px-1.5 py-0.5 rounded font-medium capitalize"
                    x-text="'+' + r.amount.toLocaleString() + ' ' + r.skill + ' xp'"></span>
            </template>
            <!-- Item reward badges (uses itemDeltas from recalculation) -->
            <template x-for="delta in getActionItemDeltas(action)" :key="delta.item">
              <span class="bg-teal-100 text-teal-700 text-xs px-1.5 py-0.5 rounded font-medium"
                    x-text="'+' + delta.quantity.toLocaleString() + ' ' + delta.name"></span>
            </template>
          </div>
        </div>

        <!-- Requirement warning icon -->
        <template x-if="action.requirementWarnings && action.requirementWarnings.length > 0">
          <span class="text-amber-500 flex-shrink-0 mr-1"
                :title="'Requirements not met: ' + action.requirementWarnings.map(w => w.skill + ' ' + w.required + ' (have ' + w.current + ')').join(', ')">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-4">
              <path fill-rule="evenodd" d="M9.401 3.003c1.155-2 4.043-2 5.197 0l7.355 12.748c1.154 2-.29 4.5-2.599 4.5H4.645c-2.309 0-3.752-2.5-2.598-4.5L9.4 3.003ZM12 8.25a.75.75 0 0 1 .75.75v3.75a.75.75 0 0 1-1.5 0V9a.75.75 0 0 1 .75-.75Zm0 8.25a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Z" clip-rule="evenodd" />
            </svg>
          </span>
        </template>

        <button @click.stop="removeTask(action.key)">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-4 text-gray-400 hover:text-gray-500">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <!-- Selected detail -->
      <div x-show="action.selected" class="mt-2 space-y-2">
        <div class="flex flex-wrap gap-x-4">
          <div>
            <p class="text-xs font-medium text-gray-500">Total Points</p>
            <p x-text="action.cumulativePoints"></p>
          </div>
          <div>
            <p class="text-xs font-medium text-gray-500">XP Multiplier</p>
            <p x-text="(action.currentMultiplier || 5) + 'x'"></p>
          </div>
        </div>
        <!-- Requirements detail -->
        <div>
          <p class="text-xs font-medium text-gray-500 mb-1">Requirements</p>
          <template x-if="Object.keys(action.requirements || {}).length === 0">
            <span class="text-xs text-green-600">None</span>
          </template>
          <div class="flex flex-wrap gap-1">
            <template x-for="w in (action.requirementWarnings || [])" :key="w.skill">
              <span class="text-xs bg-red-100 text-red-700 rounded px-1.5 py-0.5 font-medium capitalize"
                    x-text="w.skill + ' ' + w.required + ' (have ' + w.current + ')'"></span>
            </template>
            <template x-if="action.requirementWarnings && action.requirementWarnings.length === 0 && Object.keys(action.requirements || {}).length > 0">
              <span class="text-xs text-green-600 font-medium">All requirements met ✓</span>
            </template>
          </div>
        </div>
      </div>
    </li>
  </template>
