<!-- SKILL type -->
<template x-if="action.type==='skill'">
  <li @click="editingAction !== action.key && selectTask(action.key)" :class="action.selected ? 'border-indigo-600' : 'border-purple-300'" class="relative rounded-lg border bg-purple-100 px-4 py-2 shadow-sm focus-within:outline focus-within:outline-2 focus-within:outline-offset-2 focus-within:outline-indigo-600 hover:border-gray-400 cursor-hover">

    <!-- Normal view -->
    <div x-show="editingAction !== action.key">
      <div class="flex items-center space-x-3">
        <span class="drag-handle cursor-grab select-none text-gray-300 hover:text-gray-400" @click.stop title="Drag to reorder">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="display:block" class="text-black text-opacity-20">
            <circle cx="5" cy="4" r="1.4"/><circle cx="11" cy="4" r="1.4"/>
            <circle cx="5" cy="8" r="1.4"/><circle cx="11" cy="8" r="1.4"/>
            <circle cx="5" cy="12" r="1.4"/><circle cx="11" cy="12" r="1.4"/>
          </svg>
        </span>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-5 text-purple-600">
          <path fill-rule="evenodd" d="M12 1.5a.75.75 0 0 1 .75.75V4.5a.75.75 0 0 1-1.5 0V2.25A.75.75 0 0 1 12 1.5ZM5.636 4.136a.75.75 0 0 1 1.06 0l1.592 1.591a.75.75 0 0 1-1.061 1.06l-1.591-1.59a.75.75 0 0 1 0-1.061Zm12.728 0a.75.75 0 0 1 0 1.06l-1.591 1.592a.75.75 0 0 1-1.06-1.061l1.59-1.591a.75.75 0 0 1 1.061 0Zm-6.816 4.496a.75.75 0 0 1 .82.311l5.228 7.917a.75.75 0 0 1-.777 1.148l-2.097-.43 1.045 3.9a.75.75 0 0 1-1.45.388l-1.044-3.899-1.601 1.42a.75.75 0 0 1-1.247-.606l.569-9.47a.75.75 0 0 1 .554-.68ZM3 10.5a.75.75 0 0 1 .75-.75H6a.75.75 0 0 1 0 1.5H3.75A.75.75 0 0 1 3 10.5Zm14.25 0a.75.75 0 0 1 .75-.75h2.25a.75.75 0 0 1 0 1.5H18a.75.75 0 0 1-.75-.75Zm-8.962 3.712a.75.75 0 0 1 0 1.061l-1.591 1.591a.75.75 0 1 1-1.061-1.06l1.591-1.592a.75.75 0 0 1 1.06 0Z" clip-rule="evenodd" />
        </svg>

        <div class="min-w-0 flex-1">
          <p x-text="action.skillLabel" class="text-sm font-medium text-purple-900"></p>
          <div class="flex justify-between">
            <p x-text="action.methodLabel" class="text-sm text-purple-900"></p>
            <p x-text="`x ${action.quantity}`" class="text-sm text-purple-900"></p>
            <p x-text="`+${action.experience || 0} xp`" class="text-sm text-purple-900"></p>
          </div>
        </div>

        <!-- Edit button -->
        <button @click.stop="startEdit(action.key)" title="Edit" class="text-gray-400 hover:text-purple-600 mr-1">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10" />
          </svg>
        </button>

        <button @click.stop="removeTask(action.key)" class="remove-task-btn">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-4 text-gray-400 hover:text-gray-500">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <div x-show="action.selected" class="flex gap-x-4 mt-2">
        <div>
          <p class="text-xs font-medium text-gray-500">Total Points</p>
          <p x-text="action.cumulativePoints"></p>
        </div>
        <div>
          <p class="text-xs font-medium text-gray-500">Total GP</p>
          <p x-text="action.totalGold"></p>
        </div>
        <div>
          <p class="text-xs font-medium text-gray-500">Bonus Exp</p>
          <template x-if="action.bonusExp && action.bonusExp.length">
            <p x-text="action.bonusExp.map(bonus => `+${bonus.amount} ${bonus.skill}`).join(', ')"></p>
          </template>
        </div>
        <div>
          <button @click="showStats(action.key)" type="button" class="text-xs font-medium text-gray-700/60">Show Stats</button>
          <p></p>
        </div>
      </div>
    </div>

    <!-- Edit form for skill actions -->
    <div x-show="editingAction === action.key" @click.stop>
      <p class="text-xs font-semibold text-purple-800 mb-2">Edit Skill Action</p>
      <div class="flex flex-col gap-2">
        <select x-model="editFormData.skill" @change="editFormData.method = ''" class="text-sm border rounded px-2 py-1 bg-white">
          <option value="">Select skill...</option>
          <template x-for="opt in skillOptions" :key="opt.key">
            <option :value="opt.key" x-text="opt.label"></option>
          </template>
        </select>
        <select x-model="editFormData.method" class="text-sm border rounded px-2 py-1 bg-white" :disabled="!editFormData.skill">
          <option value="">Select method...</option>
          <template x-for="m in getEditMethodOptions()" :key="m.key">
            <option :value="m.key" x-text="m.name"></option>
          </template>
        </select>
        <input type="number" x-model="editFormData.quantity" min="1" class="text-sm border rounded px-2 py-1 bg-white" placeholder="Quantity">

        <!-- Edit preview -->
        <template x-if="getEditActionPreview()">
          <div class="p-2 bg-gray-50 border border-gray-200 rounded text-xs space-y-1" x-data="{ ep: null }" x-effect="ep = getEditActionPreview()">
            <div class="flex gap-x-3 flex-wrap">
              <span class="text-gray-600">XP: <span class="font-medium text-gray-800" x-text="`+${ep?.xpGain?.toLocaleString() || 0}`"></span></span>
              <span class="text-gray-600">
                Level: <span class="font-medium text-gray-800" x-text="ep ? `${ep.currentLevel} → ${ep.newLevel}` : ''"></span>
                <template x-if="ep?.levelGain > 0">
                  <span class="text-green-600 font-medium" x-text="`(+${ep.levelGain})`"></span>
                </template>
              </span>
              <template x-if="ep?.gold > 0">
                <span class="text-yellow-700">Coins: <span class="font-medium" x-text="`+${ep.gold.toLocaleString()}`"></span></span>
              </template>
            </div>
            <template x-if="ep?.itemYields?.length">
              <div class="text-gray-600">
                Yields:
                <template x-for="(y, i) in ep.itemYields" :key="y.item">
                  <span>
                    <span x-show="i > 0">, </span>
                    <span class="font-medium text-gray-800" x-text="y.isRng ? `~${y.quantity.toLocaleString(undefined, {maximumFractionDigits: 1})} ${y.name}` : `${y.quantity.toLocaleString()} ${y.name}`"></span>
                    <template x-if="y.isRng">
                      <span class="text-xs text-amber-600" x-text="`(${y.chanceLabel} chance)`"></span>
                    </template>
                  </span>
                </template>
              </div>
            </template>
            <template x-if="ep?.itemCosts?.length">
              <div>
                <span class="text-gray-600">Consumes: </span>
                <template x-for="cost in ep.itemCosts" :key="cost.item">
                  <span :class="cost.sufficient ? 'text-gray-800' : 'text-red-600 font-semibold'">
                    <span x-text="`${cost.needed.toLocaleString()} ${cost.name} (have ${cost.available.toLocaleString()})`"></span>
                    <template x-if="!cost.sufficient"><span> — insufficient</span></template>
                  </span>
                </template>
              </div>
            </template>
          </div>
        </template>

        <div class="flex gap-2 justify-end">
          <button @click="cancelEdit()" class="text-xs px-3 py-1 rounded border border-gray-300 hover:bg-gray-50">Cancel</button>
          <button @click="saveEdit()" :disabled="getEditActionPreview()?.hasInsufficientItems" class="text-xs px-3 py-1 rounded bg-purple-600 text-white hover:bg-purple-700 disabled:cursor-not-allowed disabled:bg-purple-300">Save</button>
        </div>
      </div>
    </div>
  </li>
</template>
