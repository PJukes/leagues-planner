<template id="quest-list-template">
  <div>
    <h5 class="text-gray-700 font-medium text-lg mb-3">Add Quest</h5>

    <!-- Search -->
    <div class="mb-3">
      <input
        type="text"
        x-model="questSearch"
        placeholder="Search quests..."
        class="w-full px-3 py-1.5 text-sm border border-gray-300 rounded focus:outline-none focus:ring-1 focus:ring-gray-400"
        autofocus
      >
    </div>

    <!-- Quest list -->
    <div class="space-y-2 max-h-[60vh] overflow-y-auto pr-1">
      <template x-for="quest in filteredQuestList()" :key="quest.key">
        <div :class="isQuestInPlan(quest.key) ? 'opacity-50' : ''"
             class="border border-gray-200 rounded-lg bg-gray-50 px-3 py-2">
          <div class="flex items-start justify-between gap-2">
            <div class="min-w-0 flex-1">
              <!-- Quest name -->
              <p class="text-sm font-medium text-gray-900" x-text="quest.name"></p>

              <!-- Requirements -->
              <div class="mt-1">
                <template x-if="quest.requirements.skills.length === 0 && quest.requirements.quests.length === 0">
                  <span class="text-xs px-1.5 py-0.5 rounded bg-green-100 text-green-600 font-medium">No requirements</span>
                </template>
                <template x-if="quest.requirements.skills.length > 0 || quest.requirements.quests.length > 0">
                  <div class="flex flex-wrap gap-1">
                    <template x-for="req in getQuestRequirements(quest)" :key="req.skill">
                      <span :class="req.met ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'"
                            class="text-xs px-1.5 py-0.5 rounded font-medium capitalize"
                            x-text="req.skill + ' ' + req.level"></span>
                    </template>
                  </div>
                </template>
              </div>

              <!-- Rewards row -->
              <div class="flex flex-wrap gap-1 mt-1">
                <!-- XP rewards -->
                <template x-for="r in quest.xpRewards" :key="r.skill">
                  <span class="text-xs bg-blue-100 text-blue-700 rounded px-1.5 py-0.5 font-medium capitalize"
                        x-text="'+' + r.amount.toLocaleString() + ' ' + r.skill + ' xp'"></span>
                </template>
                <!-- Item rewards -->
                <template x-for="ir in quest.itemRewards" :key="ir.item">
                  <span class="text-xs bg-teal-100 text-teal-700 rounded px-1.5 py-0.5 font-medium"
                        x-text="'+' + ir.quantity + ' ' + ir.name"></span>
                </template>
                <!-- No rewards label -->
                <template x-if="quest.xpRewards.length === 0 && quest.itemRewards.length === 0">
                  <span class="text-xs text-gray-400">No tracked rewards</span>
                </template>
              </div>
            </div>

            <!-- Add button -->
            <button
              type="button"
              @click="addQuest(quest.key)"
              :disabled="isQuestInPlan(quest.key)"
              class="flex-shrink-0 text-xs px-3 py-1.5 rounded-lg bg-gray-600 text-white hover:bg-gray-700 disabled:bg-gray-300 disabled:cursor-not-allowed font-medium"
              x-text="isQuestInPlan(quest.key) ? 'Added' : 'Add'">
            </button>
          </div>
        </div>
      </template>

      <!-- Empty state -->
      <template x-if="filteredQuestList().length === 0">
        <p class="text-sm text-gray-500 text-center py-4">No quests match your search.</p>
      </template>
    </div>
  </div>
</template>
