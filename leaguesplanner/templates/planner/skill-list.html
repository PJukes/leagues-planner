<template id="skill-list-template">
  <form>
    <h5 class="text-gray-700 font-medium text-lg mb-4">Select a Skill to Train</h5>
    <p class="text-gray-600 mb-2">Choose a skill activity and quantity.</p>
    <div class="flex justify-between gap-2">
      <div class="flex-1">
        <div><label for="skillSelection" class="text-sm text-gray-600">Skill</label></div>
        <select name="skillSelection" id="skillSelection" x-model="skillSelection" class="w-full px-2 py-1 text-sm border border-gray-300 rounded">
          <option value="">Select skill</option>
          <template x-for="s in skillOptions" :key="s.key">
            <option :value="s.key" x-text="s.label"></option>
          </template>
        </select>
      </div>

      <div class="flex-1">
        <div><label for="skillMethod" class="text-sm text-gray-600">Method</label></div>
        <select name="skillMethod" id="skillMethod" x-model="methodSelection" class="w-full px-2 py-1 text-sm border border-gray-300 rounded" :disabled="!skillSelection">
          <option value="">Select method</option>
          <template x-for="m in getMethodOptions()" :key="m.key">
            <option :value="m.key" x-text="`${m.name} (${m.xpPerAction} xp)`"></option>
          </template>
        </select>
      </div>

      <div class="flex-1">
        <div><label for="id_quantity" class="text-sm text-gray-600">Quantity</label></div>
        <input type="number" name="quantity" id="id_quantity" x-model.number="skillQuantity" placeholder="Quantity" min="1" class="w-full px-2 py-1 text-sm border border-gray-300 rounded">
      </div>
    </div>

    <!-- Action preview -->
    <template x-if="getSkillActionPreview()">
      <div class="mt-3 p-3 bg-gray-50 border border-gray-200 rounded text-sm space-y-1" x-data="{ preview: null }" x-effect="preview = getSkillActionPreview()">
        <div class="flex gap-x-4 flex-wrap">
          <span class="text-gray-600">
            XP: <span class="font-medium text-gray-800" x-text="`+${preview?.xpGain?.toLocaleString() || 0}`"></span>
          </span>
          <span class="text-gray-600">
            Level: <span class="font-medium text-gray-800" x-text="preview ? `${preview.currentLevel} → ${preview.newLevel}` : ''"></span>
            <template x-if="preview?.levelGain > 0">
              <span class="text-green-600 font-medium" x-text="`(+${preview.levelGain})`"></span>
            </template>
          </span>
          <template x-if="preview?.gold > 0">
            <span class="text-yellow-700">
              Coins: <span class="font-medium" x-text="`+${preview.gold.toLocaleString()}`"></span>
            </span>
          </template>
        </div>

        <template x-if="preview?.itemYields?.length">
          <div class="text-gray-600">
            Yields:
            <template x-for="(y, i) in preview.itemYields" :key="y.item">
              <span>
                <span x-show="i > 0">, </span>
                <span class="font-medium text-gray-800" x-text="y.isRng ? `~${y.quantity.toLocaleString(undefined, {maximumFractionDigits: 1})} ${y.name}` : `${y.quantity.toLocaleString()} ${y.name}`"></span>
                <template x-if="y.isRng">
                  <span class="text-xs text-amber-600" x-text="`(${y.chanceLabel} chance)`"></span>
                </template>
              </span>
            </template>
          </div>
        </template>

        <template x-if="preview?.itemCosts?.length">
          <div>
            <span class="text-gray-600">Consumes: </span>
            <template x-for="cost in preview.itemCosts" :key="cost.item">
              <span :class="cost.sufficient ? 'text-gray-800' : 'text-red-600 font-semibold'">
                <span x-text="`${cost.needed.toLocaleString()} ${cost.name} (have ${cost.available.toLocaleString()})`"></span>
                <template x-if="!cost.sufficient">
                  <span> — insufficient</span>
                </template>
              </span>
            </template>
          </div>
        </template>
      </div>
    </template>

    <div class="mt-4 flex justify-end">
      <button type="button"
        @click="addSkillAction(skillSelection, methodSelection, skillQuantity)"
        :disabled="!canAddSkillAction()"
        class="relative flex items-center justify-center gap-2 whitespace-nowrap rounded-lg border border-transparent bg-gray-800 px-4 py-2 text-white hover:bg-gray-900 disabled:cursor-not-allowed disabled:bg-gray-400">
        Confirm
      </button>
    </div>
  </form>
</template>
