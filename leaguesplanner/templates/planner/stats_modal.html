<div
  class="modal fade"
  id="statsModal"
  tabindex="-1"
  aria-hidden="true"
  x-data
  x-cloak
  x-show="$store.plannerModals?.isOpen('statsModal')"
  :class="$store.plannerModals?.isOpen('statsModal') ? 'show d-block' : ''"
  @click.self="$store.plannerModals?.close('statsModal')"
>
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title fw-bold" id="statsModalTitle">Player Stats</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body" id="stats-modal-body">
        <p class="text-muted small">Stats at the end of the planned route.</p>
        <div id="stats-grid"></div>
      </div>
    </div>
  </div>
</div>
