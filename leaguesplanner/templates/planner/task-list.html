<template id="task-list-template">
  <div>
    <h5 class="text-gray-700 font-medium text-lg mb-3">Select a Task</h5>

    <!-- Region filter tabs -->
    <div class="flex flex-wrap gap-1 mb-3">
      <button
        @click="setRegionFilter(null)"
        :class="regionFilter === null ? 'bg-gray-700 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'"
        class="rounded-full px-3 py-1 text-xs font-medium transition-colors"
        >All</button>
      <button
        @click="setRegionFilter('General')"
        :class="regionFilter === 'General' ? 'bg-gray-700 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'"
        class="rounded-full px-3 py-1 text-xs font-medium transition-colors"
        >General</button>
      <template x-for="region in unlockedRegions" :key="region.key">
        <button
          @click="setRegionFilter(region.key)"
          :class="regionFilter === region.key ? 'bg-green-700 text-white' : 'bg-green-100 text-green-800 hover:bg-green-200'"
          class="rounded-full px-3 py-1 text-xs font-medium transition-colors"
          x-text="region.name"
        ></button>
      </template>
    </div>

    <!-- Sortable table -->
    <div class="max-h-96 overflow-y-auto rounded-lg border border-gray-200">
      <table class="min-w-full divide-y divide-gray-200 text-sm">
        <thead class="bg-gray-50 sticky top-0 z-10">
          <tr>
            <th
              @click="setTaskSort('name')"
              class="px-3 py-2 text-left font-semibold text-gray-600 cursor-pointer select-none hover:bg-gray-100 whitespace-nowrap"
            >
              Task
              <span x-show="taskSortField === 'name'" x-text="taskSortDir === 1 ? ' ↑' : ' ↓'" class="text-gray-400"></span>
            </th>
            <th
              @click="setTaskSort('league_points')"
              class="px-3 py-2 text-right font-semibold text-gray-600 cursor-pointer select-none hover:bg-gray-100 whitespace-nowrap"
            >
              Points
              <span x-show="taskSortField === 'league_points'" x-text="taskSortDir === 1 ? ' ↑' : ' ↓'" class="text-gray-400"></span>
            </th>
            <th
              @click="setTaskSort('region')"
              class="px-3 py-2 text-left font-semibold text-gray-600 cursor-pointer select-none hover:bg-gray-100 whitespace-nowrap"
            >
              Region
              <span x-show="taskSortField === 'region'" x-text="taskSortDir === 1 ? ' ↑' : ' ↓'" class="text-gray-400"></span>
            </th>
            <th
              @click="setTaskSort('player_completion_pct')"
              class="px-3 py-2 text-right font-semibold text-gray-600 cursor-pointer select-none hover:bg-gray-100 whitespace-nowrap"
            >
              % Complete
              <span x-show="taskSortField === 'player_completion_pct'" x-text="taskSortDir === 1 ? ' ↑' : ' ↓'" class="text-gray-400"></span>
            </th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-100 bg-white">
          <template x-for="task in sortedFilteredTasks()" :key="task.key">
            <tr
              @click="addTask(task.key)"
              class="cursor-pointer hover:bg-gray-50 transition-colors"
            >
              <td class="px-3 py-2 text-gray-900 font-medium" x-text="task.name"></td>
              <td class="px-3 py-2 text-right text-gray-500 whitespace-nowrap">
                <span x-text="'+' + task.league_points + ' pts'"></span>
              </td>
              <td class="px-3 py-2">
                <span
                  :class="{
                    'bg-orange-100 text-orange-700': task.region === 'Varlamore',
                    'bg-green-100 text-green-700': task.region === 'Karamja',
                    'bg-gray-100 text-gray-700': task.region === 'General'
                  }"
                  class="inline-block rounded-full text-xs px-1.5 py-0.5 font-medium"
                  x-text="getRegionLabel(task.region)"
                ></span>
              </td>
              <td class="px-3 py-2 text-right whitespace-nowrap">
                <template x-if="task.player_completion_pct != null">
                  <span
                    :class="{
                      'text-green-600': task.player_completion_pct >= 70,
                      'text-yellow-600': task.player_completion_pct >= 40 && task.player_completion_pct < 70,
                      'text-red-500': task.player_completion_pct < 40
                    }"
                    x-text="`${Math.round(task.player_completion_pct*10)/10}%`"
                  ></span>
                </template>
                <template x-if="task.player_completion_pct == null">
                  <span class="text-gray-300">—</span>
                </template>
              </td>
            </tr>
          </template>
          <template x-if="sortedFilteredTasks().length === 0">
            <tr>
              <td colspan="4" class="px-3 py-6 text-sm text-gray-500">
                No tasks available.
              </td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
  </div>
</template>
